<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Feedback | Anveshanam</title>


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">


    <style>
        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;

        }


        body {

            background: #09090B;

            color: white;

            overflow-x: hidden;

            position: relative;

        }



        /* ================= BACKGROUND ================= */


        body::before {

            content: "";

            position: fixed;

            width: 550px;
            height: 550px;

            background: #7C3AED;

            filter: blur(180px);

            top: -180px;
            left: -180px;

            opacity: .30;

            z-index: -2;

        }



        body::after {

            content: "";

            position: fixed;

            width: 500px;
            height: 500px;

            background: #9333EA;

            filter: blur(170px);

            bottom: -200px;
            right: -160px;

            opacity: .25;

            z-index: -2;

        }



        .grid {

            position: fixed;

            inset: 0;


            background-image:

                linear-gradient(rgba(255, 255, 255, .03) 1px,
                    transparent 1px),


                linear-gradient(90deg,
                    rgba(255, 255, 255, .03) 1px,
                    transparent 1px);


            background-size: 55px 55px;


            z-index: -1;

        }



        /* ================= NAVBAR ================= */


        .navbar {


            position: fixed;

            top: 20px;

            left: 50%;

            transform: translateX(-50%);


            width: 92%;

            max-width: 1400px;


            height: 78px;


            display: flex;

            justify-content: space-between;

            align-items: center;


            padding: 0 35px;


            background: rgba(255, 255, 255, .05);


            backdrop-filter: blur(18px);


            border: 1px solid rgba(255, 255, 255, .08);


            border-radius: 20px;


            z-index: 1000;


        }



        .logo {

            display: flex;

            align-items: center;

            gap: 14px;

            text-decoration: none;

            font-size: 28px;

            font-weight: 700;

            color: white;

        }

        .logo-img {

            width: 56px;

            height: 56px;

            object-fit: cover;

            border-radius: 50%;

        }



        .nav-links {


            display: flex;

            gap: 35px;

            list-style: none;


        }



        .nav-links a {


            text-decoration: none;


            color: #B8B8C5;


            font-weight: 500;


            position: relative;


            transition: .3s;


        }



        .nav-links a:hover {


            color: white;


        }



        .nav-links a::after {


            content: "";


            position: absolute;


            left: 0;

            bottom: -8px;


            height: 2px;


            width: 0;


            background: #A855F7;


            transition: .3s;


        }



        .nav-links a:hover::after {


            width: 100%;


        }




        /* ================= FEEDBACK ================= */


        .feedback-section {


            width: 92%;

            max-width: 850px;


            margin: 160px auto 80px;


        }



        .feedback-header {


            text-align: center;

            margin-bottom: 50px;


        }



        .feedback-header h1 {


            font-size: 60px;


            font-weight: 800;


            color: white;


            -webkit-text-stroke: .7px #A855F7;



            text-shadow:


                0 0 15px rgba(168, 85, 247, .5);


        }



        .feedback-header p {


            margin-top: 15px;


            color: #A1A1AA;


            font-size: 18px;


        }




        /* CARD */


        .feedback-card {


            background: rgba(255, 255, 255, .05);


            border: 1px solid rgba(255, 255, 255, .08);


            backdrop-filter: blur(18px);


            border-radius: 28px;


            padding: 45px;


            box-shadow:

                0 20px 45px rgba(0, 0, 0, .3);


        }




        .form-group {


            margin-bottom: 22px;


        }



        label {


            display: block;


            margin-bottom: 10px;


            color: #DDD6FE;


            font-weight: 500;


        }



        input,
        textarea,
        select {


            width: 100%;


            padding: 15px 18px;


            background: rgba(255, 255, 255, .05);


            border: 1px solid rgba(255, 255, 255, .1);


            border-radius: 14px;


            color: white;


            font-size: 15px;


            outline: none;


        }



        select option {


            background: #111118;

            color: white;


        }



        textarea {


            height: 130px;


            resize: none;


        }



        input:focus,
        textarea:focus,
        select:focus {


            border-color: #A855F7;


            box-shadow:

                0 0 20px rgba(168, 85, 247, .25);


        }




        /* RATING */


        .rating {


            display: flex;


            gap: 15px;


            font-size: 30px;


            cursor: pointer;


        }



        .rating i {


            color: #52525B;


            transition: .3s;


        }



        .rating i:hover {


            color: #A855F7;


        }




        /* BUTTON */


        button {


            width: 100%;


            padding: 17px;


            border: none;


            border-radius: 16px;


            background:

                linear-gradient(135deg,
                    #8B5CF6,
                    #A855F7);


            color: white;


            font-size: 17px;


            font-weight: 600;


            cursor: pointer;


            transition: .35s;


        }



        button:hover {


            transform: translateY(-5px);


            box-shadow:

                0 15px 35px rgba(168, 85, 247, .45);


        }




        /* FOOTER */


        .footer {


            padding: 40px;

            text-align: center;

            color: #71717A;


            border-top: 1px solid rgba(255, 255, 255, .08);


        }



        @media(max-width:900px) {


            .nav-links {

                display: none;

            }



            .feedback-header h1 {

                font-size: 42px;

            }



            .feedback-card {

                padding: 30px;

            }


        }
    </style>


</head>


<body>


    <div class="grid"></div>



    <!-- NAVBAR -->


    <div class="navbar">


        <a href="Home.html" class="logo">


            <img src="../Frontend/anveshana.jpg" class="logo-img">


            Anveshanam


        </a>



        <ul class="nav-links">


            <li>
                <a href="Home.html">Home</a>
            </li>


            <li>
                <a href="LostItem.html">Lost Items</a>
            </li>


            <li>
                <a href="UploadItem.html">Upload Items</a>
            </li>


            <li>
                <a href="feedback.html">Feedback</a>
            </li>


            <li>
                <a href="account.html">Account</a>
            </li>


        </ul>


    </div>





    <section class="feedback-section">



        <div class="feedback-header">


            <h1>
                Share Feedback
            </h1>


            <p>
                Your suggestions help us improve Anveshanam.
            </p>


        </div>




        <div class="feedback-card">



            <form id="feedbackForm">


                <div class="form-group">

                    <label>
                        Name
                    </label>

                    <input type="text" id="name" placeholder="Enter your name" required>

                </div>



                <div class="form-group">

                    <label>
                        Email
                    </label>


                    <input type="email" id="email" placeholder="Enter your email" required>


                </div>




                <div class="form-group">


                    <label>
                        Feedback Category
                    </label>


                    <select id="category">


                        <option>
                            General Feedback
                        </option>

                        <option>
                            Report Issue
                        </option>

                        <option>
                            Feature Request
                        </option>

                        <option>
                            Suggestion
                        </option>


                    </select>


                </div>





                <div class="form-group">


                    <label>
                        Rating
                    </label>


                    <div class="rating">


                        <i class="fa-solid fa-star"></i>

                        <i class="fa-solid fa-star"></i>

                        <i class="fa-solid fa-star"></i>

                        <i class="fa-solid fa-star"></i>

                        <i class="fa-solid fa-star"></i>


                    </div>


                </div>




                <div class="form-group">


                    <label>
                        Message
                    </label>


                    <textarea id="message" placeholder="Write your feedback here..." required></textarea>


                </div>





                <button type="submit">


                    <i class="fa-solid fa-paper-plane"></i>

                    &nbsp;

                    Submit Feedback


                </button>




            </form>



        </div>


    </section>





    <footer class="footer">

        © 2026 Anveshanam. All rights reserved.

    </footer>





    <script>


        let stars = document.querySelectorAll(".rating i");


        let rating = 0;



        stars.forEach((star, index) => {


            star.addEventListener("click", () => {


                rating = index + 1;


                stars.forEach((s, i) => {


                    if (i < rating)

                        s.style.color = "#A855F7";

                    else

                        s.style.color = "#52525B";


                });


            });


        });





        document.getElementById("feedbackForm")
            .addEventListener("submit", (e) => {


                e.preventDefault();


                alert("Thank you for your valuable feedback!");


                document.getElementById("feedbackForm").reset();


            });



    </script>



</body>

</html>
