<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"

<body>
    <!DOCTYPE html>
    <html lang="en">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Claim Item | Anveshanam</title>

        <link rel="stylesheet" href="ClaimItem.css">

    </head>
    <style>
        /* =======================
   GENERAL
======================= */

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

            font-family: 'Poppins', sans-serif;

        }

        html {

            scroll-behavior: smooth;

        }

        body {

            background: #09090B;

            color: white;

            overflow-x: hidden;

            position: relative;

        }

        /* Background Glow */

        body::before {

            content: "";

            position: fixed;

            width: 520px;

            height: 520px;

            background: #7C3AED;

            filter: blur(180px);

            top: -180px;

            left: -180px;

            opacity: .28;

            z-index: -2;

        }

        body::after {

            content: "";

            position: fixed;

            width: 480px;

            height: 480px;

            background: #9333EA;

            filter: blur(170px);

            bottom: -180px;

            right: -140px;

            opacity: .20;

            z-index: -2;

        }

        /* Grid */

        .grid {

            position: fixed;

            inset: 0;

            background-image:

                linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),

                linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);

            background-size: 55px 55px;

            pointer-events: none;

            z-index: -1;

        }

        /* NAVBAR */

        .navbar {

            position: fixed;

            top: 20px;

            left: 50%;

            transform: translateX(-50%);

            width: 92%;

            max-width: 1400px;

            height: 78px;

            display: flex;

            align-items: center;

            justify-content: space-between;

            padding: 0 35px;

            background: rgba(255, 255, 255, .05);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 20px;

            transition: .35s;

            z-index: 1000;

        }

        .navbar:hover {

            border-color: rgba(139, 92, 246, .4);

            box-shadow: 0 0 35px rgba(139, 92, 246, .2);

        }

        .logo {

            display: flex;

            align-items: center;

            gap: 14px;

            text-decoration: none;

            font-size: 28px;

            font-weight: 700;

            color: white;

        }

        .logo-img {

            width: 56px;

            height: 56px;

            object-fit: cover;

            border-radius: 50%;

        }

        .nav-links {

            display: flex;

            gap: 35px;

            list-style: none;

        }

        .nav-links a {

            text-decoration: none;

            color: #B8B8C5;

            font-weight: 500;

            position: relative;

            transition: .3s;

        }

        .nav-links a:hover {

            color: white;

        }

        .nav-links a::after {

            content: "";

            position: absolute;

            left: 0;

            bottom: -8px;

            width: 0;

            height: 2px;

            background: #8B5CF6;

            transition: .3s;

        }

        .nav-links a:hover::after {

            width: 100%;

        }

        /* HERO */

        .heading {

            width: 92%;

            max-width: 1200px;

            margin: 150px auto 70px;

            text-align: center;

            position: relative;

        }

        .heading::before {

            content: "";

            position: absolute;

            width: 280px;

            height: 280px;

            background: #8B5CF6;

            filter: blur(140px);

            opacity: .18;

            left: 50%;

            transform: translateX(-50%);

            top: -80px;

            z-index: -1;

        }

        .heading h1 {

            font-size: 62px;

            font-weight: 800;

            color: white;

            -webkit-text-stroke: .7px #A855F7;

            text-shadow:

                0 0 8px rgba(168, 85, 247, .4),

                0 0 22px rgba(168, 85, 247, .18);

            animation: floatTitle 4s ease-in-out infinite;

            margin-bottom: 18px;

        }

        .heading p {

            max-width: 700px;

            margin: auto;

            color: #A1A1AA;

            font-size: 18px;

            line-height: 1.8;

        }

        @keyframes floatTitle {

            0% {

                transform: translateY(0);

            }

            50% {

                transform: translateY(-8px);

            }

            100% {

                transform: translateY(0);

            }

        }

        /* MAIN */

        .claim-container {

            width: 92%;

            max-width: 760px;

            margin: 0 auto 100px;

        }

        /* LEFT CARD */

        .item-card {

            background: rgba(255, 255, 255, .05);

            border: 1px solid rgba(255, 255, 255, .08);

            backdrop-filter: blur(18px);

            border-radius: 26px;

            overflow: hidden;

            transition: .35s;

            height: fit-content;

        }

        .item-card:hover {

            transform: translateY(-10px);

            border-color: #8B5CF6;

            box-shadow:

                0 20px 45px rgba(139, 92, 246, .22);

        }

        .item-card img {

            width: 100%;

            height: 280px;

            object-fit: cover;

            transition: .5s;

        }

        .item-card:hover img {

            transform: scale(1.05);

        }

        .item-info {

            padding: 30px;

        }

        .item-info h2 {

            font-size: 28px;

            margin-bottom: 25px;

        }

        .item-info p {

            display: flex;

            align-items: center;

            gap: 10px;

            margin-bottom: 18px;

            color: #B8B8C5;

            font-size: 16px;

        }

        .item-info strong {

            color: white;

            min-width: 90px;

        }

        /* ================= FORM CARD ================= */

        .claim-form {

            background: rgba(255, 255, 255, .05);

            border: 1px solid rgba(255, 255, 255, .08);

            backdrop-filter: blur(18px);

            border-radius: 26px;

            padding: 40px;

            transition: .35s;

        }

        .claim-form:hover {

            border-color: #8B5CF6;

            box-shadow:

                0 20px 45px rgba(139, 92, 246, .18);

        }

        .claim-form h2 {

            font-size: 32px;

            margin-bottom: 35px;

        }

        /* Labels */

        .claim-form label {

            display: block;

            margin-top: 22px;

            margin-bottom: 10px;

            font-size: 15px;

            font-weight: 500;

            color: #DDD6FE;

        }

        /* Inputs */

        .claim-form input,

        .claim-form textarea {

            width: 100%;

            padding: 16px 18px;

            border-radius: 14px;

            background: rgba(255, 255, 255, .05);

            border: 1px solid rgba(255, 255, 255, .08);

            outline: none;

            color: white;

            font-size: 15px;

            transition: .35s;

        }

        .claim-form textarea {

            resize: none;

            min-height: 130px;

        }

        .claim-form input::placeholder,

        .claim-form textarea::placeholder {

            color: #A1A1AA;

        }

        .claim-form input:focus,

        .claim-form textarea:focus {

            border-color: #8B5CF6;

            box-shadow:

                0 0 20px rgba(139, 92, 246, .25);

        }

        /* Two Column */

        .form-row {

            display: grid;

            grid-template-columns: repeat(2, 1fr);

            gap: 20px;

        }

        /* Checkbox */

        .checkbox {

            display: flex;

            align-items: flex-start;

            gap: 14px;

            margin-top: 28px;

        }

        .checkbox input {

            width: 20px;

            height: 20px;

            accent-color: #8B5CF6;

            margin-top: 3px;

        }

        .checkbox label {

            margin: 0;

            color: #B8B8C5;

            line-height: 1.7;

        }

        /* Button */

        .submit-btn {

            width: 100%;

            margin-top: 35px;

            padding: 18px;

            border: none;

            border-radius: 16px;

            font-size: 16px;

            font-weight: 600;

            cursor: pointer;

            color: white;

            background: linear-gradient(135deg,

                    #8B5CF6,

                    #A855F7);

            transition: .35s;

        }

        .submit-btn:hover {

            transform: translateY(-5px);

            box-shadow:

                0 12px 30px rgba(139, 92, 246, .35);

        }

        /* Mobile */

        @media(max-width:950px) {

            .claim-container {

                grid-template-columns: 1fr;

            }

            .form-row {

                grid-template-columns: 1fr;

            }

            .heading h1 {

                font-size: 46px;

            }

            .nav-links {

                display: none;

            }

        }
    </style>

    <body>

        <div class="grid"></div>

        <nav class="navbar">

            <a href="Home.html" class="logo">

                <img src="anveshana.jpg" class="logo-img">

                Anveshanam

            </a>

            <ul class="nav-links">

                <li><a href="Home.html">Home</a></li>

                <li><a href="LostItem.html">Lost Items</a></li>

                <li><a href="UploadItem.html">Upload Item</a></li>

                <li><a href="../Frontend/Feedback.html">Feedback</a></li>

                <li><a href="account.html">Account</a></li>

            </ul>

        </nav>

        <section class="heading">

            <h1>Claim Found Item</h1>

            <p>

                Complete the verification form below to request ownership of the found item.
                Your request will be reviewed by the finder before approval.

            </p>

        </section>

        <section class="claim-container">



            </div>
            <div class="claim-form">

                <h2>Claim Verification Form</h2>

                <form id="claimForm">

                    <input type="hidden" id="itemId">

                    <div class="form-row">

                        <div>

                            <label>Full Name</label>

                            <input type="text" id="claimantName" placeholder="Enter your full name" required>

                        </div>

                        <div>

                            <label>Branch</label>

                            <input type="text" id="branch" placeholder="CSE / ECE / IT" required>

                        </div>

                    </div>

                    <div class="form-row">

                        <div>

                            <label>College ID</label>

                            <input type="text" id="collegeId" placeholder="21A31A0501" required>

                        </div>

                        <div>

                            <label>Phone Number</label>

                            <input type="tel" id="phone" placeholder="10 digit mobile number" required>

                        </div>

                    </div>

                    <label>Where did you lose the item?</label>

                    <input type="text" id="lostLocation" placeholder="Example : Library, Canteen..." required>

                    <label>Approximate Date</label>

                    <input type="date" id="lostDate" required>

                    <label>Describe the Item</label>

                    <textarea id="description"
                        placeholder="Mention colour, brand, stickers, scratches, accessories etc." required>

</textarea>

                    <label>Unique Identification Marks</label>

                    <textarea id="marks" placeholder="Anything that only the real owner would know." required>

</textarea>

                    <div class="checkbox">

                        <input type="checkbox" id="agree" required>

                        <label for="agree">

                            I confirm that all the information provided above is accurate and I understand that false
                            claims may be rejected by the finder or administrator.

                        </label>

                    </div>

                    <button type="submit" class="submit-btn">

                        <i class="fa-solid fa-shield-halved"></i>

                        &nbsp;

                        Submit Claim

                    </button>

                </form>

            </div>

        </section>
    </body>

    <script>
        // ----------------------------
        // Get item ID from URL
        // ----------------------------
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get("id");

        // Store itemId in hidden input
        document.getElementById("itemId").value = itemId;

        // ----------------------------
        // Fetch Item Details
        // ----------------------------
        async function loadItem() {

            try {

                const response = await fetch(`https://anveshanam-ngpy.onrender.com/api/items/${itemId}`);

                const item = await response.json();

                document.getElementById("itemImage").src =
                    `https://anveshanam-ngpy.onrender.com/${item.image}`;

                document.getElementById("itemName").textContent =
                    item.itemName;

                document.getElementById("itemColor").textContent =
                    item.color;

                document.getElementById("itemLocation").textContent =
                    item.location;

            }

            catch (error) {

                console.log(error);

                alert("Unable to load item.");

            }

        }

        loadItem();


        // ----------------------------
        // Submit Claim
        // ----------------------------

        document.getElementById("claimForm").addEventListener("submit", async function (e) {

            e.preventDefault();

            const claimData = {

                itemId: itemId,

                claimantName: document.getElementById("claimantName").value,

                branch: document.getElementById("branch").value,

                collegeId: document.getElementById("collegeId").value,

                phone: document.getElementById("phone").value,

                lostLocation: document.getElementById("lostLocation").value,

                description: document.getElementById("description").value

            };

            try {

                const response = await fetch("https://anveshanam-ngpy.onrender.com/api/claims", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(claimData)

                });

                const data = await response.json();

                if (response.ok) {

                    alert("Claim submitted successfully!");

                    window.location.href = "LostItem.html";

                }

                else {

                    alert(data.message);

                }

            }

            catch (error) {

                console.log(error);

                alert("Server Error");

            }

        });
    </script>

    </html>
