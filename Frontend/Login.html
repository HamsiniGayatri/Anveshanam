<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Anveshanam</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">


    <style>
        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;

        }


        body {

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background: #09090B;

            color: white;

            overflow: hidden;

            position: relative;

        }


        /* Background glow */


        body::before {

            content: "";

            position: absolute;

            width: 500px;

            height: 500px;

            background: #7C3AED;

            filter: blur(180px);

            top: -150px;

            left: -150px;

            opacity: .35;

        }


        body::after {

            content: "";

            position: absolute;

            width: 450px;

            height: 450px;

            background: #9333EA;

            filter: blur(170px);

            bottom: -150px;

            right: -120px;

            opacity: .25;

        }



        .grid {

            position: absolute;

            inset: 0;


            background-image:

                linear-gradient(rgba(255, 255, 255, .03) 1px,
                    transparent 1px),

                linear-gradient(90deg,
                    rgba(255, 255, 255, .03) 1px,
                    transparent 1px);


            background-size: 55px 55px;

        }




        /* Login Card */


        .container {


            width: 420px;


            padding: 45px;


            background: rgba(255, 255, 255, .05);


            backdrop-filter: blur(20px);


            border-radius: 28px;


            border: 1px solid rgba(255, 255, 255, .1);


            box-shadow:

                0 20px 50px rgba(0, 0, 0, .4);


            position: relative;


            z-index: 2;


        }



        .container:hover {


            border-color: #8B5CF6;


            box-shadow:

                0 0 40px rgba(139, 92, 246, .3);


        }




        .container h1 {


            text-align: center;


            font-size: 42px;


            font-weight: 800;


            color: white;


            -webkit-text-stroke: .7px #A855F7;


            text-shadow:

                0 0 12px rgba(168, 85, 247, .5);


            margin-bottom: 10px;


        }



        .container h2 {


            text-align: center;


            color: #A1A1AA;


            font-size: 20px;


            font-weight: 400;


            margin-bottom: 35px;


        }



        /* Form */


        form {


            display: flex;

            flex-direction: column;

            gap: 20px;


        }



        form input {


            width: 100%;


            padding: 15px 18px;


            border-radius: 14px;


            background: rgba(255, 255, 255, .05);


            border: 1px solid rgba(255, 255, 255, .12);


            color: white;


            font-size: 15px;


            outline: none;


            transition: .3s;


        }



        form input::placeholder {


            color: #9CA3AF;


        }



        form input:focus {


            border-color: #A855F7;


            box-shadow:

                0 0 20px rgba(168, 85, 247, .3);


        }




        button {


            padding: 16px;


            border: none;


            border-radius: 14px;


            background:

                linear-gradient(135deg,
                    #8B5CF6,
                    #A855F7);


            color: white;


            font-size: 17px;


            font-weight: 600;


            cursor: pointer;


            transition: .35s;


            box-shadow:

                0 0 25px rgba(168, 85, 247, .35);


        }



        button:hover {


            transform: translateY(-4px);


            box-shadow:

                0 0 35px rgba(168, 85, 247, .7);


        }




        .register-link {


            text-align: center;


            margin-top: 25px;


            color: #A1A1AA;


            font-size: 14px;


        }



        .register-link a {


            color: #C084FC;


            text-decoration: none;


            font-weight: 600;


        }



        .register-link a:hover {


            color: white;


        }



        .logo-icon {

            text-align: center;

            margin-bottom: 20px;

        }


        .logo-icon img {

            width: 80px;

            height: 80px;

            object-fit: cover;

            border-radius: 50%;

            box-shadow:
                0 0 25px rgba(168, 85, 247, .5);

        }



        @media(max-width:450px) {


            .container {


                width: 90%;

                padding: 30px;


            }


            .container h1 {


                font-size: 34px;


            }



        }
    </style>


</head>



<body>


    <div class="grid"></div>



    <div class="container">


        <div class="logo-icon">

            <img src="anveshana.jpg">

        </div>


        <h1>
            Anveshanam
        </h1>


        <h2>
            Welcome Back
        </h2>



        <form id="loginForm">


            <input type="text" id="studentId" placeholder="Student ID" required>



            <input type="password" id="password" placeholder="Password" required>



            <button type="submit">

                Login

            </button>



        </form>



        <div class="register-link">


            Don't have an account?

            <a href="register.html">

                Register

            </a>


        </div>



    </div>





    <script>


        if (localStorage.getItem("token")) {

            window.location.href = "Home.html";

        }


        const form = document.getElementById("loginForm");



        form.addEventListener("submit", async (e) => {


            e.preventDefault();



            const studentId = document.getElementById("studentId").value.trim();

            const password = document.getElementById("password").value;



            if (!studentId || !password) {

                alert("Please fill all fields.");

                return;

            }



            try {


                const response = await fetch(
                    "http://fetch("https://anveshanam-ngpy.onrender.com"):5000/api/auth/login",
                    {

                        method: "POST",

                        headers: {

                            "Content-Type": "application/json"

                        },

                        body: JSON.stringify({

                            studentId,

                            password

                        })

                    });



                const data = await response.json();



                if (response.ok) {


                    localStorage.setItem("token", data.token);

                    localStorage.setItem(
                        "user",
                        JSON.stringify(data.user)
                    );



                    alert(data.message);



                    if (data.user.role === "admin") {

                        window.location.href = "adminDashboard.html";

                    }

                    else {

                        window.location.href = "Home.html";

                    }


                }

                else {


                    alert(data.message);


                }



            }

            catch (error) {


                console.error(error);

                alert("Server Error");


            }



        });


    </script>



</body>

</html>
