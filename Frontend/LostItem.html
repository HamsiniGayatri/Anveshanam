<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        background: #09090B;
        color: white;
        overflow-x: hidden;
        position: relative;
    }

    /* Background Glow */

    body::before {

        content: "";

        position: fixed;

        width: 520px;

        height: 520px;

        background: #7C3AED;

        filter: blur(170px);

        top: -180px;

        left: -180px;

        opacity: .28;

        z-index: -2;

    }

    body::after {

        content: "";

        position: fixed;

        width: 480px;

        height: 480px;

        background: #9333EA;

        filter: blur(180px);

        bottom: -180px;

        right: -150px;

        opacity: .22;

        z-index: -2;

    }

    /* Grid */

    .grid {

        position: fixed;

        inset: 0;

        background-image:

            linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),

            linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);

        background-size: 55px 55px;

        z-index: -1;

        pointer-events: none;

    }

    /* ================= NAVBAR ================= */

    .navbar {

        position: fixed;

        top: 20px;

        left: 50%;

        transform: translateX(-50%);

        width: 92%;

        max-width: 1400px;

        height: 78px;

        display: flex;

        align-items: center;

        justify-content: space-between;

        padding: 0 35px;

        background: rgba(255, 255, 255, .05);

        backdrop-filter: blur(18px);

        border: 1px solid rgba(255, 255, 255, .08);

        border-radius: 20px;

        z-index: 1000;

        transition: .35s;

    }

    .navbar:hover {

        border-color: rgba(139, 92, 246, .45);

        box-shadow: 0 0 35px rgba(139, 92, 246, .18);

    }

    .logo {

        display: flex;

        align-items: center;

        gap: 14px;

        text-decoration: none;

        font-size: 28px;

        font-weight: 700;

        color: white;

    }

    .logo-img {

        width: 56px;

        height: 56px;

        border-radius: 50%;

        object-fit: cover;

    }

    .nav-links {

        display: flex;

        list-style: none;

        gap: 35px;

    }

    .nav-links a {

        text-decoration: none;

        color: #B8B8C5;

        font-weight: 500;

        position: relative;

        transition: .3s;

    }

    .nav-links a:hover {

        color: white;

    }

    .nav-links a::after {

        content: "";

        position: absolute;

        left: 0;

        bottom: -8px;

        width: 0;

        height: 2px;

        background: #8B5CF6;

        transition: .3s;

    }

    .nav-links a:hover::after {

        width: 100%;

    }

    /* ================= HERO ================= */

    .page-hero {

        width: 92%;

        max-width: 1400px;

        margin: 150px auto 70px;

        text-align: center;

    }

    .page-hero h1 {

        font-size: 64px;

        font-weight: 800;

        color: #FFFFFF;

        -webkit-text-stroke: 0.7px #A855F7;

        text-shadow:
            0 0 6px rgba(168, 85, 247, .45),
            0 0 15px rgba(168, 85, 247, .25),
            0 0 30px rgba(168, 85, 247, .15);

        letter-spacing: 1px;

        animation: floatTitle 4s ease-in-out infinite;

    }

    @keyframes floatTitle {

        0% {

            transform: translateY(0px);

        }

        50% {

            transform: translateY(-8px);

        }

        100% {

            transform: translateY(0px);

        }

    }

    .page-hero {

        position: relative;

    }

    .page-hero::before {

        content: "";

        position: absolute;

        width: 320px;

        height: 320px;

        background: #8B5CF6;

        filter: blur(140px);

        opacity: .18;

        left: 50%;

        top: -80px;

        transform: translateX(-50%);

        z-index: -1;

    }

    .page-hero p {

        max-width: 720px;

        margin: auto;

        font-size: 18px;

        line-height: 1.8;

        color: #A1A1AA;

    }

    /* ================= FILTER ================= */

    .filter-box {

        width: 92%;

        max-width: 1400px;

        margin: auto;

        padding: 28px;

        background: rgba(255, 255, 255, .05);

        border: 1px solid rgba(255, 255, 255, .08);

        border-radius: 24px;

        backdrop-filter: blur(18px);

        display: flex;

        gap: 18px;

        flex-wrap: wrap;

        justify-content: center;

        margin-bottom: 35px;

    }

    .filter-box input,

    .filter-box select {

        background: rgba(255, 255, 255, .06);

        border: 1px solid rgba(255, 255, 255, .08);

        color: white;

        padding: 15px 18px;

        border-radius: 14px;

        font-size: 15px;

        outline: none;

        min-width: 230px;

        transition: .3s;

    }

    .filter-box input::placeholder {

        color: #B4B4C7;

    }

    .filter-box input:focus,

    .filter-box select:focus {

        border-color: #8B5CF6;

        box-shadow: 0 0 20px rgba(139, 92, 246, .25);

    }

    .filter-box option {

        background: #1A1A22;

        color: white;

    }

    /* ================= RESULT ================= */

    #resultCount {

        width: 92%;

        max-width: 1400px;

        margin: 0 auto 30px;

        font-size: 18px;

        color: #C4B5FD;

    }

    /* ================= GRID ================= */

    .items-container {

        width: 92%;

        max-width: 1400px;

        margin: auto;

        display: grid;

        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));

        gap: 35px;

        padding-bottom: 80px;

    }

    /* ================= ITEM CARD ================= */

    .item-card {

        background: rgba(255, 255, 255, .05);

        border: 1px solid rgba(255, 255, 255, .08);

        backdrop-filter: blur(18px);

        border-radius: 24px;

        overflow: hidden;

        transition: .35s;

        position: relative;

    }

    .item-card:hover {

        transform: translateY(-12px);

        border-color: #8B5CF6;

        box-shadow:
            0 20px 45px rgba(139, 92, 246, .22);

    }

    /* Image */

    .item-image {

        position: relative;

        overflow: hidden;

    }

    .item-image img {

        width: 100%;

        height: 240px;

        object-fit: cover;

        transition: .5s;

    }

    .item-card:hover img {

        transform: scale(1.06);

    }

    /* Status Badge */

    .status-badge {

        position: absolute;

        top: 18px;

        right: 18px;

        padding: 8px 16px;

        border-radius: 30px;

        font-size: 13px;

        font-weight: 600;

        backdrop-filter: blur(12px);

    }

    .available {

        background: rgba(34, 197, 94, .18);

        color: #4ADE80;

        border: 1px solid rgba(34, 197, 94, .4);

    }

    .pending {

        background: rgba(250, 204, 21, .18);

        color: #FACC15;

        border: 1px solid rgba(250, 204, 21, .4);

    }

    .claimed {

        background: rgba(239, 68, 68, .18);

        color: #F87171;

        border: 1px solid rgba(239, 68, 68, .4);

    }

    /* Card Content */

    .item-details {

        padding: 28px;

    }

    .item-details h3 {

        font-size: 25px;

        margin-bottom: 22px;

    }

    /* Info */

    .info-row {

        display: flex;

        align-items: center;

        gap: 10px;

        margin-bottom: 15px;

        color: #B8B8C5;

        font-size: 15px;

    }

    .info-row i {

        width: 18px;

        color: #A855F7;

    }

    /* Button */

    .claim-btn,
    .pending-btn,
    .claimed-btn {

        width: 100%;

        margin-top: 25px;

        padding: 15px;

        border: none;

        border-radius: 14px;

        font-size: 15px;

        font-weight: 600;

        transition: .35s;

    }

    .claim-btn {

        background: linear-gradient(135deg,
                #8B5CF6,
                #A855F7);

        color: white;

        cursor: pointer;

    }

    .claim-btn:hover {

        transform: translateY(-4px);

        box-shadow:
            0 10px 30px rgba(139, 92, 246, .35);

    }

    .pending-btn {

        background: #EAB308;

        color: #111;

        cursor: not-allowed;

    }

    .claimed-btn {

        background: #16A34A;

        color: white;

        cursor: not-allowed;

    }

    .claimed-image {

        filter: grayscale(90%);

        opacity: .55;

    }
</style>

<body>

    <div class="grid"></div>

    <div class="navbar">

        <a href="Home.html" class="logo">

            <img src="../Frontend/anveshana.jpg" class="logo-img">

            Anveshanam

        </a>

        <ul class="nav-links">

            <li><a href="Home.html">Home</a></li>

            <li><a href="#">Lost Items</a></li>

            <li><a href="UploadItem.html">Upload Item</a></li>

            <li><a href="../Frontend/Feedback.html">Feedback</a></li>

            <li><a href="account.html">Account</a></li>

        </ul>

    </div>

    <section class="page-hero">

        <h1>Recently Found Items</h1>

        <p>

            Browse all reported items across the campus,
            search by category or location, and securely
            submit claims to recover your belongings.

        </p>

    </section>

    <div class="filter-box">

        <input type="text" id="searchInput" placeholder="Search by item, color or location">

        <select id="statusFilter">

            <option value="All">All Status</option>

            <option value="Available">Available</option>

            <option value="Pending">Pending</option>

            <option value="Claimed">Claimed</option>

        </select>

        <select id="categoryFilter">

            <option value="All">All Categories</option>

            <option value="Water Bottle">Water Bottle</option>

            <option value="Wallet">Wallet</option>

            <option value="Mobile Phone">Mobile Phone</option>

            <option value="Laptop / Charger">Laptop / Charger</option>

            <option value="Bag / Backpack">Bag / Backpack</option>

            <option value="Books / Notes">Books / Notes</option>

            <option value="Keys">Keys</option>

            <option value="Watch">Watch</option>

            <option value="Other">Other</option>

        </select>

        <select id="sortFilter">

            <option value="Newest">Newest First</option>

            <option value="Oldest">Oldest First</option>

        </select>

    </div>

    <h3 id="resultCount"></h3>

    <div id="itemsContainer" class="items-container">
        <script>
            let allItems = [];

            async function loadItems() {

                try {

                    const response = await fetch("http://localhost:5000/api/items");

                    allItems = await response.json();

                    displayItems(allItems);


                }

                catch (error) {

                    console.log(error);

                }

            }

            loadItems();
            function displayItems(items) {

                const container = document.getElementById("itemsContainer");

                container.innerHTML = "";

                document.getElementById("resultCount").innerHTML =
                    `Showing ${items.length} Item(s)`;

                items.forEach(item => {

                    container.innerHTML += `

<div class="item-card">

<div class="item-image">

<img
src="http://localhost:5000/uploads/${item.image}"
class="${item.status === "Claimed" ? "claimed-image" : ""}">

<div class="status-badge

${item.status === "Available"
                            ? "available"
                            : item.status === "Pending"
                                ? "pending"
                                : "claimed"}">

${item.status}

</div>

</div>

<div class="item-details">

<h3>${item.itemName}</h3>

<div class="info-row">

<i class="fa-solid fa-location-dot"></i>

<span>${item.location}</span>

</div>

<div class="info-row">

<i class="fa-solid fa-palette"></i>

<span>${item.color}</span>

</div>

<div class="info-row">

<i class="fa-solid fa-user"></i>

<span>${item.name}</span>

</div>

${item.status === "Available"

                            ?

                            `<button
class="claim-btn"
onclick="claimItem('${item._id}')">

Claim Item

</button>`

                            :

                            item.status === "Pending"

                                ?

                                `<button
class="pending-btn"
disabled>

Claim Under Review

</button>`

                                :

                                `<button
class="claimed-btn"
disabled>

Claimed

</button>`

                        }

</div>

</div>

`;

                });

            }
            document.getElementById("searchInput").addEventListener("input", filterItems);
            document.getElementById("statusFilter").addEventListener("change", filterItems);
            document.getElementById("categoryFilter").addEventListener("change", filterItems);
            document.getElementById("sortFilter").addEventListener("change", filterItems);

            function filterItems() {

                let filteredItems = [...allItems];

                // Search
                const searchText = document
                    .getElementById("searchInput")
                    .value
                    .toLowerCase();

                filteredItems = filteredItems.filter(item =>

                    item.itemName.toLowerCase().includes(searchText) ||

                    item.location.toLowerCase().includes(searchText) ||

                    item.color.toLowerCase().includes(searchText)

                );

                // Status Filter
                const status = document.getElementById("statusFilter").value;

                if (status !== "All") {

                    filteredItems = filteredItems.filter(item =>
                        item.status === status
                    );

                }

                // Category Filter
                const category = document.getElementById("categoryFilter").value;

                if (category !== "All") {

                    filteredItems = filteredItems.filter(item =>
                        item.itemName === category
                    );

                }

                // Sort
                const sort = document.getElementById("sortFilter").value;

                if (sort === "Newest") {

                    filteredItems.sort((a, b) =>

                        new Date(b.createdAt) - new Date(a.createdAt)

                    );

                }

                else {

                    filteredItems.sort((a, b) =>

                        new Date(a.createdAt) - new Date(b.createdAt)

                    );

                }

                displayItems(filteredItems);

            }

            function claimItem(itemId) {

                window.location.href = `ClaimItem.html?id=${itemId}`;

            }
        </script>

</html>
